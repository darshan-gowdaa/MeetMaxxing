version: "3.9"

services:
  backend:
    build: ./backend
    container_name: meetmaxxing-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped
    networks:
      - meetmaxxing-net

  redis:
    image: redis:7-alpine
    container_name: meetmaxxing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - meetmaxxing-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: meetmaxxing-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - meetmaxxing-net

  kong-db:
    image: postgres:13
    container_name: meetmaxxing-kong-db
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    volumes:
      - kong_data:/var/lib/postgresql/data
    networks:
      - meetmaxxing-net

  kong-migrations:
    image: kong:3.4.0
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
    depends_on:
      - kong-db
    networks:
      - meetmaxxing-net

  kong:
    image: kong:3.4.0
    container_name: meetmaxxing-kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
    volumes:
      - ./docker/kong/kong.yml:/kong/kong.yml
    ports:
      - "80:8000"
      - "443:8443"
      - "8001:8001"
    depends_on:
      - kong-migrations
      - backend
    networks:
      - meetmaxxing-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: meetmaxxing-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - meetmaxxing-net

volumes:
  redis_data:
  qdrant_data:
  kong_data:

networks:
  meetmaxxing-net:
    driver: bridge
