<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeetMaxxing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0f0f13;color:#e8e8f0;width:320px;min-height:400px;display:flex;flex-direction:column}
    .header{padding:16px;border-bottom:1px solid rgba(255,255,255,0.08);background:#1a1a24}
    .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;background:linear-gradient(135deg,#3b82f6,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo-svg{width:24px;height:24px;flex-shrink:0}
    .tagline{font-size:11px;color:#7a7a9a;margin-top:2px}
    
    main{flex:1;padding:24px;display:flex;flex-direction:column;gap:16px;align-items:center;}
    
    .status-card{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:16px 20px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      width:100%;
      text-align:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.2);
    }
    .status-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#7a7a9a}
    .status-val{font-size:18px;font-weight:800;letter-spacing:-0.02em}
    .status-live{color:#6dd58c;text-shadow:0 0 10px rgba(109,213,140,0.3)}
    .status-idle{color:#868e96}
    
    .btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:12px 20px;
      border-radius:999px;
      font-size:13px;font-weight:700;letter-spacing:0.02em;
      font-family:inherit;cursor:pointer;border:none;width:100%;
      transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .btn-primary{
      background:rgba(59,130,246,0.15);
      color:#60a5fa;
      border:1px solid rgba(59,130,246,0.3);
    }
    .btn-primary:hover{
      background:rgba(59,130,246,0.25);
    }
    
    .btn-secondary{
      background:rgba(255,255,255,0.04);
      color:#a1a1aa;
      border:1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover{
      background:rgba(255,255,255,0.08);
      color:#fff;
    }
    
    footer{padding:12px 16px;text-align:center;font-size:11px;color:#7a7a9a;border-top:1px solid rgba(255,255,255,0.06)}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      MeetMaxxing
    </div>
    <div class="tagline">AI Meeting Copilot</div>
  </div>

  <main>
    <div class="status-card">
      <span class="status-label">Meeting Status</span>
      <span id="status-val" class="status-val status-idle">Not in meeting</span>
    </div>

    <button class="btn btn-primary" id="open-sidepanel-btn">
      Open Copilot Panel
    </button>
    <button class="btn btn-secondary" id="open-dashboard-btn">
      Open Dashboard
    </button>
  </main>
  
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
